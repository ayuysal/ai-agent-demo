name = "ai-demo-proxy"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# KV Namespace for email leads + rate limiting
[[kv_namespaces]]
binding = "DEMO_KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
# Set your Anthropic API key as a secret instead:
# npx wrangler secret put ANTHROPIC_API_KEY
ALLOWED_ORIGIN = "https://your-demo-domain.com"
MAX_MESSAGES_PER_SESSION = "20"
SESSION_TTL_SECONDS = "3600"
